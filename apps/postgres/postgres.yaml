# NOTE: the "postgres-secret" Secret is no longer here in plaintext.
# It now lives — encrypted — in postgres-sealedsecret.yaml. The sealed-secrets
# controller decrypts that in-cluster into a normal Secret named "postgres-secret",
# which the Deployment below consumes via envFrom.
---
# The Postgres server itself. A single replica Deployment is plenty for learning.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: data
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secret
          # Where Postgres stores its data inside the container
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "platform"]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        # emptyDir = data lives as long as the pod does. Ephemeral, but simplest.
        # We'll graduate to a real PersistentVolumeClaim when we do Helm in Phase 3.
        - name: data
          emptyDir: {}
---
# A stable in-cluster address so other apps can reach Postgres at
# "postgres.data.svc.cluster.local:5432"
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: data
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
