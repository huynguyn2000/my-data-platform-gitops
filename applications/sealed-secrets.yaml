apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  annotations:
    # Wave -10: the secrets layer must exist BEFORE anything that needs a secret.
    # (Earlier than postgres at -5, so the CRD + controller are up first on a cold start.)
    argocd.argoproj.io/sync-wave: "-10"
spec:
  project: default
  source:
    repoURL: https://github.com/huynguyn2000/my-data-platform-gitops
    targetRevision: main
    path: apps/sealed-secrets        # the release manifest we committed
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
