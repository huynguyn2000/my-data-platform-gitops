apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tenants
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]

  # THE GENERATOR: scan the repo for sub-folders under tenants/ .
  # Each matching folder becomes one "element" the template is stamped over.
  generators:
    - git:
        repoURL: https://github.com/huynguyn2000/my-data-platform-gitops
        revision: main
        directories:
          - path: tenants/*

  # THE TEMPLATE: one Application shape, parameterised by each folder.
  # {{.path.basename}} = folder name (e.g. "marketing"); {{.path.path}} = "tenants/marketing".
  template:
    metadata:
      name: 'tenant-{{.path.basename}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/huynguyn2000/my-data-platform-gitops
        targetRevision: main
        path: '{{.path.path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: 'tenant-{{.path.basename}}'   # isolated namespace per tenant
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
